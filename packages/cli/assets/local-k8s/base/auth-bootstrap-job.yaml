apiVersion: batch/v1
kind: Job
metadata:
  name: auth-db-bootstrap
  namespace: eve
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-db-bootstrap
    spec:
      containers:
        - name: bootstrap
          image: postgres:16-alpine
          command: ["sh", "/scripts/bootstrap-auth-role.sh"]
          env:
            - name: PGHOST
              value: "postgres.eve.svc.cluster.local"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: "eve"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: eve-postgres
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: eve-postgres
                  key: POSTGRES_PASSWORD
            - name: AUTH_ROLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eve-app
                  key: EVE_AUTH_ADMIN_PASSWORD
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: auth-bootstrap-scripts
            defaultMode: 0755
      restartPolicy: OnFailure
