apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-worker
  namespace: eve
  labels:
    app.kubernetes.io/name: eve-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eve-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eve-worker
    spec:
      serviceAccountName: eve-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      # container securityContext + probes injected by base kustomization patches/
      containers:
        - name: worker
          image: eve-horizon/worker:local
          imagePullPolicy: IfNotPresent
          envFrom:
            # Mount all secrets from eve-app (auth tokens, etc.)
            - secretRef:
                name: eve-app
            # Cluster-wide config (DATABASE_URL, service URLs, EVE_STORAGE_*).
            # Inline env entries below override these if names collide.
            - configMapRef:
                name: eve-cluster-config
          env:
            - name: EVE_RUNTIME
              value: k8s
            - name: EVE_K8S_NAMESPACE
              value: eve
            - name: EVE_BUILDKIT_ADDR
              value: tcp://buildkitd.eve.svc:1234
            # Image used for spawning runner pods in the Kubernetes cluster
            - name: EVE_RUNNER_IMAGE
              value: eve-horizon/worker:local
            - name: EVE_RUNNER_SERVICE_ACCOUNT
              value: eve-worker
            - name: WORKER_PORT
              value: "4749"
            - name: EVE_ORG_FS_ROOT
              value: /org
            - name: EVE_TOOLCHAIN_ROOT
              value: /opt/eve/toolchains
            - name: EVE_TOOLCHAIN_IMAGE_PREFIX
              value: eve-horizon/toolchain-
            - name: EVE_TOOLCHAIN_IMAGE_TAG
              value: local
            # --- Object Storage credentials (endpoint config from eve-cluster-config) ---
            - name: EVE_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
                  optional: true
            - name: EVE_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
                  optional: true
          ports:
            - name: http
              containerPort: 4749
          volumeMounts:
            - name: toolchains
              mountPath: /opt/eve/toolchains
      volumes:
        - name: toolchains
          emptyDir: {}
