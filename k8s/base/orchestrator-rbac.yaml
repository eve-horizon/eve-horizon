apiVersion: v1
kind: ServiceAccount
metadata:
  name: eve-orchestrator
  namespace: eve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eve-orchestrator
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/status
      - events
    verbs:
      - get
      - list
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale
    verbs:
      - get
      - list
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eve-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eve-orchestrator
subjects:
  - kind: ServiceAccount
    name: eve-orchestrator
    namespace: eve
