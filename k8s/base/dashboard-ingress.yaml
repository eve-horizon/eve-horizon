apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eve-dashboard
  namespace: eve
spec:
  ingressClassName: traefik
  rules:
    - host: dashboard.eve.lvh.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eve-dashboard
                port:
                  number: 3200
