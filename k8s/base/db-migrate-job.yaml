apiVersion: batch/v1
kind: Job
metadata:
  name: eve-db-migrate
  namespace: eve
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eve-db-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: eve-horizon/worker:local
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: DATABASE_URL
          command:
            - node
            - /app/packages/db/dist/migrate.js
