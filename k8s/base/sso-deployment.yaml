apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-sso
  namespace: eve
  labels:
    app.kubernetes.io/name: eve-sso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eve-sso
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eve-sso
    spec:
      # securityContext injected by base kustomization patches/
      # (probes stay inline: sso uses timeoutSeconds + 10s liveness delay)
      containers:
        - name: sso
          image: eve-horizon/sso:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3100
          envFrom:
            - secretRef:
                name: eve-app
          env:
            - name: PORT
              value: "3100"
            - name: EVE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_API_URL
            - name: SUPABASE_AUTH_URL
              value: http://supabase-auth:9999
            - name: SUPABASE_AUTH_EXTERNAL_URL
              value: http://auth.eve.lvh.me
            - name: EVE_DEFAULT_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_DEFAULT_DOMAIN
            - name: EVE_SSO_SECURE_COOKIES
              value: "false"
            # Optional: restrict self-signup to specific email domains (comma-separated)
            # - name: EVE_SIGNUP_ALLOWED_EMAIL_DOMAINS
            #   value: "example.com,example.org"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
