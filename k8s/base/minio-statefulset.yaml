apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: eve-minio
  namespace: eve
  labels:
    app.kubernetes.io/name: eve-minio
spec:
  serviceName: eve-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eve-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eve-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-12-18T13-15-44Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER_FILE
              value: /var/run/secrets/minio/access-key
            - name: MINIO_ROOT_PASSWORD_FILE
              value: /var/run/secrets/minio/secret-key
            - name: MINIO_API_CORS_ALLOW_ORIGIN
              value: "*"
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
            - name: minio-credentials
              mountPath: /var/run/secrets/minio
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: minio-credentials
          secret:
            secretName: minio-credentials
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: eve-minio
  namespace: eve
  labels:
    app.kubernetes.io/name: eve-minio
spec:
  selector:
    app.kubernetes.io/name: eve-minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
