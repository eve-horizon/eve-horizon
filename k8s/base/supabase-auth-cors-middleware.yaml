apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: supabase-auth-cors
  namespace: eve
spec:
  headers:
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    accessControlAllowHeaders:
      - "Content-Type"
      - "Authorization"
      - "apikey"
      - "X-Client-Info"
    accessControlAllowOriginList:
      - "http://sso.eve.lvh.me"
    accessControlAllowCredentials: true
    accessControlMaxAge: 600
