apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-orchestrator
  namespace: eve
  labels:
    app.kubernetes.io/name: eve-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eve-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eve-orchestrator
    spec:
      serviceAccountName: eve-orchestrator
      # pod/container securityContext + probes injected by base kustomization patches/
      initContainers:
        - name: wait-for-worker
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              echo "Waiting for worker to be ready..."
              until wget -q --spider http://eve-worker:4749/health 2>/dev/null; do
                echo "Worker not ready, retrying in 2s..."
                sleep 2
              done
              echo "Worker is ready!"
      containers:
        - name: orchestrator
          image: eve-horizon/orchestrator:local
          imagePullPolicy: IfNotPresent
          envFrom:
            # Mount all secrets from eve-app
            - secretRef:
                name: eve-app
          env:
            # Shared cluster values come from the eve-cluster-config ConfigMap.
            # (No envFrom: the orchestrator must not inherit the storage/SSO vars.)
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: DATABASE_URL
            - name: EVE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_API_URL
            - name: ORCHESTRATOR_PORT
              value: "4702"
            - name: WORKER_URL
              value: http://eve-worker:4749
            - name: EVE_WORKER_URLS
              value: default-worker=http://eve-worker:4749
            - name: EVE_AGENT_RUNTIME_URL
              value: http://eve-agent-runtime:4812
            - name: EVE_AGENT_RUNTIME_URLS
              value: >-
                eve-agent-runtime-0=http://eve-agent-runtime-0.eve-agent-runtime.eve.svc.cluster.local:4812,
                eve-agent-runtime-1=http://eve-agent-runtime-1.eve-agent-runtime.eve.svc.cluster.local:4812,
                eve-agent-runtime-2=http://eve-agent-runtime-2.eve-agent-runtime.eve.svc.cluster.local:4812
            - name: WORKSPACE_ROOT
              value: /opt/eve/workspaces
          ports:
            - name: http
              containerPort: 4702
