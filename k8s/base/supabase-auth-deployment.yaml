apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-auth
  namespace: eve
  labels:
    app.kubernetes.io/name: supabase-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: supabase-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supabase-auth
    spec:
      containers:
        - name: gotrue
          image: supabase/gotrue:v2.185.0
          ports:
            - containerPort: 9999
              name: http
          env:
            # --- Database ---
            - name: GOTRUE_DB_DRIVER
              value: postgres
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: eve-postgres
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eve-postgres
                  key: POSTGRES_PASSWORD
            - name: GOTRUE_DB_DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@postgres.eve.svc.cluster.local:5432/eve?sslmode=disable&search_path=auth"
            - name: PORT
              value: "9999"
            - name: GOTRUE_API_PORT
              value: "9999"
            # --- JWT ---
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: eve-app
                  key: SUPABASE_JWT_SECRET
            - name: GOTRUE_JWT_EXP
              value: "3600"
            # --- URLs ---
            - name: API_EXTERNAL_URL
              value: "http://auth.eve.lvh.me"
            - name: GOTRUE_SITE_URL
              value: "http://sso.eve.lvh.me"
            - name: GOTRUE_URI_ALLOW_LIST
              value: ""
            # --- Sign-up / Email ---
            - name: GOTRUE_DISABLE_SIGNUP
              value: "false"
            - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
              value: "true"
            - name: GOTRUE_MAILER_AUTOCONFIRM
              value: "true"
            # --- SMTP (Mailpit) ---
            - name: GOTRUE_SMTP_HOST
              value: "mailpit.eve.svc.cluster.local"
            - name: GOTRUE_SMTP_PORT
              value: "1025"
            - name: GOTRUE_SMTP_ADMIN_EMAIL
              value: "noreply@eve.local"
            # --- Mailer URL paths ---
            # GoTrue's /verify endpoint handles token verification and redirects
            # to SITE_URL with tokens in the hash fragment. Using /callback here
            # causes "OAuth state parameter missing" errors.
            - name: GOTRUE_MAILER_URLPATHS_CONFIRMATION
              value: "/verify"
            - name: GOTRUE_MAILER_URLPATHS_INVITE
              value: "/verify"
            - name: GOTRUE_MAILER_URLPATHS_RECOVERY
              value: "/verify"
            - name: GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE
              value: "/verify"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 15
            periodSeconds: 30
