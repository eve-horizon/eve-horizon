apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-api
  namespace: eve
  labels:
    app.kubernetes.io/name: eve-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eve-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eve-api
    spec:
      serviceAccountName: eve-api
      # securityContext + probes injected by base kustomization patches/
      containers:
        - name: api
          image: eve-horizon/api:local
          imagePullPolicy: IfNotPresent
          envFrom:
            # Mount all secrets from eve-app (auth tokens, API keys, etc.)
            - secretRef:
                name: eve-app
          env:
            # Shared cluster values come from the eve-cluster-config ConfigMap.
            # (No envFrom here: the api must not inherit EVE_API_URL from it.)
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: DATABASE_URL
            - name: API_PORT
              value: "4701"
            - name: WORKER_URL
              value: http://eve-worker.eve.svc.cluster.local:4749
            # --- Web Auth (Supabase) ---
            - name: SUPABASE_AUTH_URL
              value: "http://supabase-auth.eve.svc.cluster.local:9999"
            - name: SUPABASE_AUTH_EXTERNAL_URL
              value: "http://auth.eve.lvh.me"
            - name: EVE_SSO_URL
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_SSO_URL
            - name: EVE_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_PUBLIC_API_URL
            # --- SMTP (Mailpit locally; staging overrides in infra repo) ---
            - name: GOTRUE_SMTP_HOST
              value: "mailpit.eve.svc.cluster.local"
            - name: GOTRUE_SMTP_PORT
              value: "1025"
            - name: GOTRUE_SMTP_ADMIN_EMAIL
              value: "noreply@eve.local"
            - name: MAILER_FROM_ADDRESS
              value: "noreply@eve.local"
            - name: EVE_GATEWAY_URL
              value: "http://eve-gateway.eve.svc.cluster.local:4820"
            - name: EVE_DEFAULT_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_DEFAULT_DOMAIN
            # --- Object Storage (credentials from minio-credentials Secret) ---
            - name: EVE_STORAGE_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_STORAGE_BACKEND
            - name: EVE_STORAGE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_STORAGE_ENDPOINT
            - name: EVE_STORAGE_PUBLIC_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_STORAGE_PUBLIC_ENDPOINT
            - name: EVE_STORAGE_REGION
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_STORAGE_REGION
            - name: EVE_STORAGE_ORG_BUCKET_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_STORAGE_ORG_BUCKET_PREFIX
            - name: EVE_STORAGE_INTERNAL_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: eve-cluster-config
                  key: EVE_STORAGE_INTERNAL_BUCKET
            - name: EVE_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: EVE_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
          ports:
            - name: http
              containerPort: 4701
