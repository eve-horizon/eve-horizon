apiVersion: v1
kind: ConfigMap
metadata:
  name: eve-otel-collector-config
  namespace: eve
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    processors:
      batch: {}
    exporters:
      awsxray: {}
      awsemf:
        namespace: EveHorizon
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [awsxray]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [awsemf]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-otel-collector
  namespace: eve
  labels:
    app.kubernetes.io/name: eve-otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eve-otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eve-otel-collector
    spec:
      containers:
        - name: collector
          image: public.ecr.aws/aws-observability/aws-otel-collector:latest
          args: ["--config=/etc/otel/otel-collector-config.yaml"]
          env:
            - name: AWS_REGION
              value: us-east-1
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: eve-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: eve
spec:
  selector:
    app.kubernetes.io/name: eve-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
