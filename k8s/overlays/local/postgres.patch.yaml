apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: eve
spec:
  template:
    spec:
      containers:
        - name: postgres
          image: eve-postgres-local:16
          imagePullPolicy: IfNotPresent
          args:
            - postgres
            - -c
            - shared_preload_libraries=pg_cron
            - -c
            - cron.database_name=postgres
