name: Publish Chat SDK

on:
  push:
    tags:
      - 'chat-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/chat-v}" >> $GITHUB_OUTPUT

      - name: Update package versions
        run: |
          cd packages/chat
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version
          cd ../chat-react
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Publish @eve-horizon/chat
        run: pnpm --filter @eve-horizon/chat publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @eve-horizon/chat-react
        run: pnpm --filter @eve-horizon/chat-react publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
