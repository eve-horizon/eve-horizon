name: Build Toolchain Images

on:
  push:
    tags: ['toolchain-images/v*']
    paths: ['docker/toolchains/**']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ECR_REGISTRY: public.ecr.aws/w7c4v0w3
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE || 'eve-horizon' }}
  AWS_ECR_REGION: ${{ vars.AWS_ECR_REGION || 'eu-west-1' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [python, media, rust, java, kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_ECR_REGION }}

      - name: Login to Amazon ECR (public)
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/toolchain-images/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/toolchain-images/v}
          else
            VERSION="sha-$(git rev-parse --short HEAD)"
          fi
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Ensure ECR repository exists
        run: |
          ECR_REPOSITORY="${{ env.ECR_NAMESPACE }}/toolchain-${{ matrix.toolchain }}"
          if ! aws ecr-public describe-repositories --repository-names "$ECR_REPOSITORY" --region us-east-1 >/dev/null 2>&1; then
            aws ecr-public create-repository --repository-name "$ECR_REPOSITORY" --region us-east-1 >/dev/null
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/toolchains/${{ matrix.toolchain }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/toolchain-${{ matrix.toolchain }}:${{ steps.version.outputs.value }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/toolchain-${{ matrix.toolchain }}:latest
          platforms: linux/amd64,linux/arm64
