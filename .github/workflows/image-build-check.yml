
# Builds every service image without pushing, so a broken Dockerfile fails on the
# PR that breaks it rather than on the release tag that needs it.
#
# `ci.yml` only runs `pnpm build` + unit tests — it never exercises a Dockerfile.
# That gap meant image breakage could sit on `main` undetected until someone cut
# a `release-v*` tag and watched Publish Images fail.
#
# Build-only: no registry login, no credentials, no push. Uses the GitHub Actions
# cache rather than the ECR registry cache so it works on fork PRs too.
name: Image Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docker/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/image-build-check.yml'
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docker/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/image-build-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            target: production
          - service: sso
            dockerfile: apps/sso/Dockerfile
            target: production
          - service: gateway
            dockerfile: apps/gateway/Dockerfile
            target: production
          - service: agent-runtime
            dockerfile: apps/agent-runtime/Dockerfile
            target: production
          - service: orchestrator
            dockerfile: apps/orchestrator/Dockerfile
            target: production
          - service: worker
            dockerfile: apps/worker/Dockerfile
            target: base
          - service: dashboard
            dockerfile: apps/dashboard/Dockerfile
            target: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Mirrors publish-images.yml: same dockerfile, same target, same platform.
      # Keep the two matrices in sync — this check is only meaningful if it
      # builds what the release actually builds.
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          build-args: |
            EVE_BUILD_VERSION=0.0.0-check
            EVE_BUILD_SHA=${{ github.sha }}
            EVE_BUILD_TIME=1970-01-01T00:00:00Z
          cache-from: type=gha,scope=image-check-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=image-check-${{ matrix.service }}
          platforms: linux/amd64
